<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Infra Status Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>Infra Status Dashboard</h1>
  <div class="controls">
    <label>環境:
      <select id="env-select"></select>
    </label>
    <label>チェック間隔(秒):
      <input id="interval-input" type="number" min="5" step="5" value="60">
    </label>
    <button id="toggle-btn">一時停止</button>
    <button id="refresh-btn">今すぐ更新</button>
    <span id="last-updated" class="last-updated"></span>
    <span id="status-msg" class="status-msg"></span>
  </div>
</header>
<main>
  <div id="summary"></div>
  <div id="targets"></div>
</main>
<script src="/app.js"></script>
</body>
</html>
