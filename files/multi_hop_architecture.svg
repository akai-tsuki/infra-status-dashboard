<svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>踏み台経由の多段SSH接続構成図</title>
<desc>Windowsアプリから踏み台サーバへSSH接続し、踏み台から各対象サーバへ多段SSH接続する。command-serverのようなviaを指定した対象サーバは、踏み台から直接ではなくcommand-server経由で3段目として接続する。</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"></path>
  </marker>
  <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"></path>
  </marker>
</defs>

<style>
  .box { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.5; }
  .box-relay { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; }
  .title { font-family: sans-serif; font-size: 15px; fill: #111827; font-weight: 600; }
  .subtitle { font-family: sans-serif; font-size: 11px; fill: #4b5563; }
  .edge { stroke: #6b7280; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  .edge-accent { stroke: #2563eb; stroke-width: 1.5; fill: none; marker-end: url(#arrow-accent); }
  .edge-label { font-family: sans-serif; font-size: 10.5px; fill: #4b5563; }
</style>

<rect width="920" height="600" fill="#ffffff"></rect>

<!-- Windows app -->
<rect class="box" x="370" y="16" width="180" height="56" rx="10"></rect>
<text class="title" x="460" y="40" text-anchor="middle">Windows</text>
<text class="subtitle" x="460" y="58" text-anchor="middle">ダッシュボードアプリ</text>

<line class="edge" x1="460" y1="72" x2="460" y2="126"></line>
<text class="edge-label" x="470" y="102">SSH（ID/パスワード）</text>

<!-- Bastion -->
<rect class="box" x="370" y="128" width="180" height="56" rx="10"></rect>
<text class="title" x="460" y="152" text-anchor="middle">踏み台サーバ</text>
<text class="subtitle" x="460" y="170" text-anchor="middle">bastion</text>

<!-- edges from bastion to 3 direct targets -->
<line class="edge" x1="410" y1="184" x2="150" y2="248"></line>
<line class="edge" x1="460" y1="184" x2="460" y2="248"></line>
<line class="edge" x1="510" y1="184" x2="770" y2="248"></line>
<text class="edge-label" x="150" y="222" text-anchor="middle">SSH（秘密鍵）</text>
<text class="edge-label" x="530" y="222" text-anchor="middle">SSH（秘密鍵）</text>
<text class="edge-label" x="775" y="222" text-anchor="middle">SSH（秘密鍵）</text>

<!-- target-vm-a -->
<rect class="box" x="60" y="250" width="180" height="56" rx="10"></rect>
<text class="title" x="150" y="274" text-anchor="middle">target-vm-a</text>
<text class="subtitle" x="150" y="292" text-anchor="middle">roles: openshift（直接到達）</text>

<!-- sample target -->
<rect class="box" x="370" y="250" width="180" height="56" rx="10"></rect>
<text class="title" x="460" y="274" text-anchor="middle">sample-vm01</text>
<text class="subtitle" x="460" y="292" text-anchor="middle">roles: sample_role_a（直接到達）</text>

<!-- command-server (relay) -->
<rect class="box-relay" x="680" y="250" width="180" height="56" rx="10"></rect>
<text class="title" x="770" y="274" text-anchor="middle">command-server</text>
<text class="subtitle" x="770" y="292" text-anchor="middle">中継役 兼 監視対象</text>

<!-- edge command-server -> target-deep (accent, via) -->
<line class="edge-accent" x1="770" y1="306" x2="770" y2="360"></line>
<text class="edge-label" x="838" y="336" text-anchor="middle">SSH（秘密鍵）</text>

<!-- target-deep -->
<rect class="box" x="680" y="362" width="180" height="56" rx="10"></rect>
<text class="title" x="770" y="386" text-anchor="middle">target-deep</text>
<text class="subtitle" x="770" y="404" text-anchor="middle">via: command-server</text>

<!-- legend -->
<rect x="60" y="470" width="14" height="14" fill="#f9fafb" stroke="#9ca3af"></rect>
<text class="subtitle" x="80" y="481">config.yamlのtargets（viaなし＝踏み台から直接接続）</text>

<rect x="60" y="496" width="14" height="14" fill="#eff6ff" stroke="#2563eb"></rect>
<text class="subtitle" x="80" y="507">中継役になるtarget（他のtargetのvia先に指定される）</text>

<line x1="60" y1="524" x2="74" y2="524" stroke="#2563eb" stroke-width="2"></line>
<text class="subtitle" x="80" y="528">viaで指定した経由接続（3段目のホップ）</text>

<text class="subtitle" x="60" y="560">config.yaml: target-deepは roles: [...] に加えて via: command-server を指定する。</text>
<text class="subtitle" x="60" y="580">command-serverへの接続が失敗すると target-deep 側は「中継サーバ「command-server」への接続に失敗しました」と表示される。</text>
</svg>
